services:
  - type: web
    name: ai-content-detector-api
    runtime: python
    pythonVersion: "3.11.0"
    buildCommand: pip install --prefer-binary -r project/AiContentDetector/backend/requirements.txt
    startCommand: cd project/AiContentDetector/backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
