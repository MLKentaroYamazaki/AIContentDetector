name: Weekly Slack to Confluence Sync

on:
  schedule:
    - cron: '0 6 * * 2'  # UTC 06:00 = JST 15:00, 毎週火曜日
  workflow_dispatch:       # 手動実行も可能

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CONF_URL: ${{ secrets.CONF_URL }}
          CONF_USER: ${{ secrets.CONF_USER }}
          CONF_TOKEN: ${{ secrets.CONF_TOKEN }}
          CONF_SPACE: ${{ secrets.CONF_SPACE }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python slack-to-confluence/main.py

      - name: Run tests
        run: pytest tests/ -v
